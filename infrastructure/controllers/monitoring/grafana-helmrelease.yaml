apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: grafana
      version: ">=8.0.0 <9.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    persistence:
      enabled: true
      size: 5Gi
    grafana.ini:
      unified_alerting:
        enabled: true
      alerting:
        enabled: false
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Mimir
            type: prometheus
            uid: mimir
            url: http://mimir-nginx.monitoring.svc.cluster.local/prometheus
            isDefault: true
            jsonData:
              httpMethod: POST
              httpHeaderName1: "X-Scope-OrgID"
            secureJsonData:
              httpHeaderValue1: "default"
          - name: Loki
            type: loki
            uid: loki
            url: http://loki.monitoring.svc.cluster.local:3100
            jsonData:
              httpHeaderName1: "X-Scope-OrgID"
            secureJsonData:
              httpHeaderValue1: "default"
          - name: Tempo
            type: tempo
            uid: tempo
            url: http://tempo.monitoring.svc.cluster.local:3100
            jsonData:
              httpHeaderName1: "X-Scope-OrgID"
              tracesToLogsV2:
                datasourceUid: loki
                filterByTraceID: true
              serviceMap:
                datasourceUid: mimir
              nodeGraph:
                enabled: true
            secureJsonData:
              httpHeaderValue1: "default"
    alerting:
      contactpoints.yaml:
        apiVersion: 1
        contactPoints:
          - orgId: 1
            name: ntfy
            receivers:
              - uid: ntfy-receiver
                type: webhook
                settings:
                  url: http://ntfy.ntfy.svc.cluster.local/alerts
                  httpMethod: POST
      policies.yaml:
        apiVersion: 1
        policies:
          - orgId: 1
            receiver: ntfy