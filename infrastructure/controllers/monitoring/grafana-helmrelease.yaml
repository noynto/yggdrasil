apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: grafana
      version: ">=8.0.0 <9.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    persistence:
      enabled: true
      size: 5Gi
    grafana.ini:
      unified_alerting:
        enabled: true
      alerting:
        enabled: false
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Mimir
            type: prometheus
            uid: mimir
            url: http://mimir-nginx.monitoring.svc.cluster.local/prometheus
            isDefault: true
            jsonData:
              httpMethod: POST
              httpHeaderName1: "X-Scope-OrgID"
            secureJsonData:
              httpHeaderValue1: "default"
          - name: Loki
            type: loki
            uid: loki
            url: http://loki.monitoring.svc.cluster.local:3100
            jsonData:
              httpHeaderName1: "X-Scope-OrgID"
            secureJsonData:
              httpHeaderValue1: "default"
          - name: Tempo
            type: tempo
            uid: tempo
            url: http://tempo.monitoring.svc.cluster.local:3100
            jsonData:
              httpHeaderName1: "X-Scope-OrgID"
              tracesToLogsV2:
                datasourceUid: loki
                filterByTraceID: true
              serviceMap:
                datasourceUid: mimir
              nodeGraph:
                enabled: true
            secureJsonData:
              httpHeaderValue1: "default"
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: kubernetes
            orgId: 1
            folder: Kubernetes
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/kubernetes
    dashboards:
      kubernetes:
        otel-kubeletstats:
          gnetId: 18681
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Mimir
        otel-node:
          gnetId: 18682
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Mimir
        otel-host-metrics:
          gnetId: 24638
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Mimir
        otel-pods-metrics:
          gnetId: 20944
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Mimir
    alerting:
      templates.yaml:
        apiVersion: 1
        templates:
          - orgId: 1
            name: ntfy
            template: |
              {{ define "ntfy.title" -}}
              [{{ .Status | toUpper }}] {{ range .Alerts }}{{ .Labels.alertname }} {{ end }}
              {{- end }}
              {{ define "ntfy.message" -}}
              {{- if gt (len .Alerts.Firing) 0 -}}
              Firing:{{ range .Alerts.Firing }}
              - {{ .Labels.alertname }}{{ if .Annotations.summary }}: {{ .Annotations.summary }}{{ end }}{{ end }}
              {{ end -}}
              {{- if gt (len .Alerts.Resolved) 0 -}}
              Resolved:{{ range .Alerts.Resolved }}
              - {{ .Labels.alertname }}{{ end }}
              {{ end -}}
              {{- end }}
      contactpoints.yaml:
        apiVersion: 1
        contactPoints:
          - orgId: 1
            name: ntfy
            receivers:
              - uid: ntfy-receiver
                type: webhook
                settings:
                  url: http://ntfy.ntfy.svc.cluster.local/alerts
                  httpMethod: POST
                  body: '{"topic":"alerts","title":"{{ "{{" }} template "ntfy.title" . {{ "}}" }}","message":"{{ "{{" }} template "ntfy.message" . {{ "}}" }}"}'
      policies.yaml:
        apiVersion: 1
        policies:
          - orgId: 1
            receiver: ntfy
      rules.yaml:
        apiVersion: 1
        groups:
          - orgId: 1
            name: Infrastructure
            folder: Alerts
            interval: 1m
            rules:
              - uid: node-cpu-high
                title: "CPU élevé"
                condition: C
                data:
                  - refId: A
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: mimir
                    model:
                      expr: "(1 - avg by(k8s_node_name)(rate(system_cpu_time_total{state=\"idle\"}[5m])) / avg by(k8s_node_name)(rate(system_cpu_time_total[5m]))) * 100"
                      refId: A
                  - refId: B
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: "__expr__"
                    model:
                      type: reduce
                      refId: B
                      expression: A
                      reducer: last
                  - refId: C
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: "__expr__"
                    model:
                      type: threshold
                      refId: C
                      expression: B
                      conditions:
                        - evaluator:
                            type: gt
                            params: [85]
                          operator:
                            type: and
                          query:
                            params: [C]
                          reducer:
                            type: last
                          type: query
                noDataState: NoData
                execErrState: Error
                for: 5m
                annotations:
                  summary: "CPU usage > 85% depuis 5 minutes"
                labels:
                  severity: warning
                isPaused: false

              - uid: node-memory-high
                title: "Mémoire élevée"
                condition: C
                data:
                  - refId: A
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: mimir
                    model:
                      expr: "system_memory_usage_bytes{state=\"used\"} / ignoring(state) group_left sum by(k8s_node_name)(system_memory_usage_bytes) * 100"
                      refId: A
                  - refId: B
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: "__expr__"
                    model:
                      type: reduce
                      refId: B
                      expression: A
                      reducer: last
                  - refId: C
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: "__expr__"
                    model:
                      type: threshold
                      refId: C
                      expression: B
                      conditions:
                        - evaluator:
                            type: gt
                            params: [85]
                          operator:
                            type: and
                          query:
                            params: [C]
                          reducer:
                            type: last
                          type: query
                noDataState: NoData
                execErrState: Error
                for: 5m
                annotations:
                  summary: "Mémoire > 85% depuis 5 minutes"
                labels:
                  severity: warning
                isPaused: false

              - uid: node-disk-high
                title: "Disque presque plein"
                condition: C
                data:
                  - refId: A
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: mimir
                    model:
                      expr: "(1 - system_filesystem_usage_bytes{state=\"free\"} / (system_filesystem_usage_bytes{state=\"used\"} + system_filesystem_usage_bytes{state=\"free\"})) * 100"
                      refId: A
                  - refId: B
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: "__expr__"
                    model:
                      type: reduce
                      refId: B
                      expression: A
                      reducer: max
                  - refId: C
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: "__expr__"
                    model:
                      type: threshold
                      refId: C
                      expression: B
                      conditions:
                        - evaluator:
                            type: gt
                            params: [85]
                          operator:
                            type: and
                          query:
                            params: [C]
                          reducer:
                            type: last
                          type: query
                noDataState: NoData
                execErrState: Error
                for: 5m
                annotations:
                  summary: "Disque > 85% utilisé depuis 5 minutes"
                labels:
                  severity: warning
                isPaused: false

              - uid: pod-crash-loop
                title: "Pod en CrashLoop"
                condition: C
                data:
                  - refId: A
                    relativeTimeRange:
                      from: 900
                      to: 0
                    datasourceUid: mimir
                    model:
                      expr: "increase(k8s_container_restarts[15m])"
                      refId: A
                  - refId: B
                    relativeTimeRange:
                      from: 900
                      to: 0
                    datasourceUid: "__expr__"
                    model:
                      type: reduce
                      refId: B
                      expression: A
                      reducer: max
                  - refId: C
                    relativeTimeRange:
                      from: 900
                      to: 0
                    datasourceUid: "__expr__"
                    model:
                      type: threshold
                      refId: C
                      expression: B
                      conditions:
                        - evaluator:
                            type: gt
                            params: [5]
                          operator:
                            type: and
                          query:
                            params: [C]
                          reducer:
                            type: last
                          type: query
                noDataState: NoData
                execErrState: Error
                for: 0s
                annotations:
                  summary: "{{ $labels.k8s_pod_name }} redémarre trop souvent ({{ $values.B.Value | humanize }} fois en 15min)"
                labels:
                  severity: critical
                isPaused: false