apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: mimir-distributed
      version: ">=5.0.0 <6.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    mimir:
      structuredConfig:
        multitenancy_enabled: true
    ingester:
      replicas: 1
      zoneAwareReplication:
        enabled: false
    store_gateway:
      replicas: 1
      zoneAwareReplication:
        enabled: false
    distributor:
      replicas: 1
    querier:
      replicas: 1
    query_frontend:
      replicas: 1
    compactor:
      replicas: 1
    alertmanager:
      enabled: false
    ruler:
      replicas: 1