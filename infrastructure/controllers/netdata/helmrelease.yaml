apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netdata
  namespace: netdata
spec:
  interval: 30m
  chart:
    spec:
      chart: netdata
      version: ">=3.7.0 <4.0.0"
      sourceRef:
        kind: HelmRepository
        name: netdata
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    parent:
      configs:
        health:
          enabled: true
          path: /etc/netdata/health_alarm_notify.conf
    child:
      enabled: true
      configs:
        netdata:
          enabled: true
          path: /etc/netdata/netdata.conf
          data: |
            [global]
              run as user = netdata
            [health]
              enabled = yes